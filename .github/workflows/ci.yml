name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: 0.11.29
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen --extra dev --python ${{ matrix.python-version }}

      - name: Verify lockfile
        run: uv lock --check

      - name: Lint
        run: uv run --python ${{ matrix.python-version }} ruff check .

      - name: Check formatting
        run: uv run --python ${{ matrix.python-version }} ruff format --check .

      - name: Type check
        run: uv run --python ${{ matrix.python-version }} mypy

      - name: Check generated schemas
        run: uv run --python ${{ matrix.python-version }} python -m sentinel.schema check

      - name: Test with branch coverage
        run: uv run --python ${{ matrix.python-version }} pytest

      - name: Audit locked runtime dependencies
        run: >-
          uv export --locked --no-dev --no-editable --no-emit-project
          --format requirements-txt |
          uv run --python ${{ matrix.python-version }} pip-audit
          --no-deps --disable-pip
          --ignore-vuln PYSEC-2026-2132
          --ignore-vuln CVE-2026-52870
          --ignore-vuln CVE-2026-52869
          --ignore-vuln CVE-2026-59950
          -r /dev/stdin

  distribution:
    name: Distribution smoke test
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: 0.11.29
          enable-cache: true

      - name: Build wheel and source distribution
        run: uv build

      - name: Install wheel in a clean environment
        run: |
          python -m venv "$RUNNER_TEMP/sentinel-wheel"
          "$RUNNER_TEMP/sentinel-wheel/bin/pip" install dist/*.whl

      - name: Smoke-test installed package and schemas
        run: |
          "$RUNNER_TEMP/sentinel-wheel/bin/sentinel" --version
          "$RUNNER_TEMP/sentinel-wheel/bin/sentinel" scan --help
          "$RUNNER_TEMP/sentinel-wheel/bin/python" -c "from importlib import resources; root=resources.files('sentinel').joinpath('_schemas'); assert root.joinpath('finding.schema.json').is_file(); assert root.joinpath('report.schema.json').is_file(); assert root.joinpath('sarif-2.1.0.schema.json').is_file()"
