name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: 0.8.22
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen --extra dev --python ${{ matrix.python-version }}

      - name: Verify lockfile
        run: uv lock --check

      - name: Lint
        run: uv run --python ${{ matrix.python-version }} ruff check .

      - name: Check formatting
        run: uv run --python ${{ matrix.python-version }} ruff format --check .

      - name: Type check
        run: uv run --python ${{ matrix.python-version }} mypy

      - name: Check generated schemas
        run: uv run --python ${{ matrix.python-version }} python -m sentinel.schema check

      - name: Check judge artifacts
        run: uv run --python ${{ matrix.python-version }} python -m scripts.generate_phase5_artifacts --check

      - name: Check generated third-party notices
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: uv run --python ${{ matrix.python-version }} python scripts/generate_third_party_notices.py --check

      - name: Test with branch coverage
        run: uv run --python ${{ matrix.python-version }} pytest

      - name: Plan GPT smoke without credentials or network
        run: >-
          uv run --python ${{ matrix.python-version }} python
          scripts/capture_gpt_reviews.py smoke

      - name: Audit locked runtime dependencies
        run: |
          uv export --locked --no-dev --no-editable --no-emit-project --format requirements-txt --output-file "${{ runner.temp }}/runtime-requirements.txt"
          uv run --python ${{ matrix.python-version }} pip-audit --no-deps --disable-pip --ignore-vuln PYSEC-2026-2132 --ignore-vuln CVE-2026-52870 --ignore-vuln CVE-2026-52869 --ignore-vuln CVE-2026-59950 -r "${{ runner.temp }}/runtime-requirements.txt"

  build-wheel:
    name: Build canonical wheel
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: 0.8.22
          enable-cache: true

      - name: Build wheel and source distribution
        run: uv build

      - name: Upload canonical wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mcp-sentinel-wheel
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 90

  distribution:
    name: Wheel (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download canonical wheel
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: mcp-sentinel-wheel
          path: dist

      - name: Install pipx
        run: python -m pip install pipx

      - name: Smoke-test the wheel through pip and pipx
        run: python scripts/smoke_wheel.py dist

  docker-demo:
    name: Installed-wheel Docker replay
    runs-on: ubuntu-latest
    needs: build-wheel

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Download canonical wheel
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: mcp-sentinel-wheel
          path: dist

      - name: Install canonical wheel
        run: python -m pip install dist/*.whl

      - name: Run packaged replay demo
        run: sentinel demo --replay-review --output-dir "${{ runner.temp }}/sentinel-demo-results"

      - name: Validate installed-wheel demo reports
        run: |
          python -c "import json; from pathlib import Path; from sentinel.report.validate_json import validate_report_data; validate_report_data(json.loads(Path(r'${{ runner.temp }}/sentinel-demo-results/report.json').read_text(encoding='utf-8')))"
          python -m sentinel.report.validate_sarif "${{ runner.temp }}/sentinel-demo-results/report.sarif"
