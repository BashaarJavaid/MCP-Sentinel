name: MCP Sentinel
description: Scan a Python MCP server and upload validated SARIF to GitHub code scanning.
author: Bashaar Javaid

inputs:
  target-path:
    description: Repository-relative path to the MCP server to scan.
    required: false
    default: "."
  fail-on:
    description: Lowest non-suppressed finding severity that fails the Action.
    required: false
    default: high
  openai-api-key:
    description: OpenAI API key used for required live GPT semantic review.
    required: false
    default: ""
  static-only:
    description: Skip Docker-backed dynamic probing while retaining GPT review.
    required: false
    default: "false"

outputs:
  sarif-path:
    description: Absolute path to the validated Sentinel SARIF report.
    value: ${{ steps.scan.outputs.sarif-path }}
  findings-count:
    description: Number of visible SARIF results, including suppressed findings.
    value: ${{ steps.scan.outputs.findings-count }}
  highest-severity:
    description: Highest non-suppressed severity, or none.
    value: ${{ steps.scan.outputs.highest-severity }}

runs:
  using: composite
  steps:
    - name: Set up Python 3.12
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: "3.12"

    - name: Install MCP Sentinel from the Action ref
      shell: bash
      env:
        SENTINEL_ACTION_PATH: ${{ github.action_path }}
      run: python -m pip install --disable-pip-version-check "$SENTINEL_ACTION_PATH"

    - name: Run and validate MCP Sentinel
      id: scan
      shell: bash
      env:
        SENTINEL_ACTION_OPENAI_API_KEY: ${{ inputs.openai-api-key }}
      run: >-
        python "$GITHUB_ACTION_PATH/scripts/run_github_action.py"
        --target-path "${{ inputs.target-path }}"
        --fail-on "${{ inputs.fail-on }}"
        --static-only "${{ inputs.static-only }}"

    - name: Upload SARIF to GitHub code scanning
      id: upload
      if: steps.scan.outputs.upload-ready == 'true'
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
      with:
        sarif_file: ${{ steps.scan.outputs.sarif-path }}
        checkout_path: ${{ steps.scan.outputs.checkout-path }}
        category: ${{ steps.scan.outputs.category }}

    - name: Preserve Sentinel exit contract
      if: always()
      shell: bash
      env:
        SENTINEL_EXIT_CODE: ${{ steps.scan.outputs.effective-exit-code }}
        SENTINEL_UPLOAD_READY: ${{ steps.scan.outputs.upload-ready }}
        SENTINEL_UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
      run: |
        exit_code="${SENTINEL_EXIT_CODE:-3}"
        if [[ "$SENTINEL_UPLOAD_READY" == "true" && "$SENTINEL_UPLOAD_OUTCOME" != "success" ]]; then
          exit_code=3
        fi
        exit "$exit_code"

branding:
  icon: shield
  color: red
