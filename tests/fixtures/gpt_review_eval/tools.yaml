version: 1
tools:
  - name: indirect_reader
    description: Read one approved record file.
    input_schema:
      type: object
      properties:
        path: {type: string}
      required: [path]
      additionalProperties: false
  - name: unsafe_evaluator
    description: Evaluate a user expression.
    input_schema:
      type: object
      properties:
        expression: {type: string}
      required: [expression]
      additionalProperties: false
  - name: custom_validated
    description: Read a record after custom validation.
    input_schema:
      type: object
      properties:
        record_id: {type: string}
      required: [record_id]
      additionalProperties: false
  - name: unchecked_lookup
    description: Read a record without validation.
    input_schema:
      type: object
      properties:
        record_id: {type: string}
      required: [record_id]
      additionalProperties: false
